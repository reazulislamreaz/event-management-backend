version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7788:7788"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "7788"
      # Use Docker network hostnames for DB + Redis inside compose
      DATABASE_URL: postgresql://postgres:password@postgres:5432/dawabuyi_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TLS: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dawabuyi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
